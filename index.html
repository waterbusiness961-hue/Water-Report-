<!DOCTYPE html>
<html>
<head>
  <title>Water Supply Reporting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding:15px; background:#f5f5f5;}
    select, input, button { width:100%; padding:10px; margin:8px 0; }

    .card { background:white; padding:10px; margin-top:10px; border-radius:8px; }
    .add { background:green; color:white; }
    .submit { background:blue; color:white; }

    .hab-list {
      background:white;
      padding:10px;
      border-radius:8px;
      max-height:200px;
      overflow:auto;
    }

    .hab-list label {
      display:flex;
      justify-content:space-between;
      padding:6px;
    }
  </style>
</head>

<body>

<h2>Water Supply Reporting</h2>

<label>Date</label>
<input type="date" id="reportDate">

<select id="gp"><option>Select GP</option></select>
<select id="village"><option>Select Village</option></select>

<div id="habitationList" class="hab-list"></div>

<button class="add" onclick="addSession()">Add Entry</button>

<h3>Entries</h3>
<div id="list"></div>

<button class="submit" onclick="submitAll()">Submit All</button>

<script>

const URL = "YOUR_WEB_APP_URL_HERE";

let data = {};
let sessions = [];

// LOAD DATA
fetch(URL)
.then(res => res.json())
.then(d => {
  data = d;
  loadGP();
});

// GP LOAD
function loadGP() {
  let gpSel = document.getElementById("gp");
  gpSel.innerHTML = `<option value="">Select GP</option>`;
  for (let g in data) {
    gpSel.innerHTML += `<option value="${g}">${g}</option>`;
  }
}

// GP CHANGE
document.getElementById("gp").onchange = function() {
  let gp = this.value;
  let vSel = document.getElementById("village");
  vSel.innerHTML = `<option value="">Select Village</option>`;
  document.getElementById("habitationList").innerHTML = "";

  if (data[gp]) {
    for (let v in data[gp]) {
      vSel.innerHTML += `<option value="${v}">${v}</option>`;
    }
  }
};

// VILLAGE CHANGE
document.getElementById("village").onchange = function() {
  let gp = document.getElementById("gp").value;
  let village = this.value;
  let div = document.getElementById("habitationList");
  div.innerHTML = "";

  if (data[gp] && data[gp][village]) {
    data[gp][village].forEach(h => {
      div.innerHTML += `
        <label>${h}
        <input type="checkbox" value="${h}">
        </label>`;
    });
  }
};

// ADD SESSION
function addSession() {
  let gp = document.getElementById("gp").value;
  let village = document.getElementById("village").value;
  let date = document.getElementById("reportDate").value;
  let checked = document.querySelectorAll("#habitationList input:checked");

  if (!gp || !village || !date || checked.length === 0) {
    alert("Fill all fields");
    return;
  }

  checked.forEach(c => {
    sessions.push({
      gp,
      village,
      hab: c.value,
      date,
      start: "",
      end: "",
      photo: ""
    });
  });

  document.getElementById("gp").value = "";
  document.getElementById("village").innerHTML = `<option value="">Select Village</option>`;
  document.getElementById("reportDate").value = "";
  document.getElementById("habitationList").innerHTML = "";

  render();
}

// RENDER
function render() {
  let div = document.getElementById("list");
  div.innerHTML = "";

  sessions.forEach((s, i) => {
    div.innerHTML += `
      <div class="card">
        <b>${s.gp}</b> - ${s.village} - ${s.hab}<br>
        Date: ${s.date}<br>

        Start:
        <input type="time" onchange="sessions[${i}].start=this.value">

        End:
        <input type="time" onchange="sessions[${i}].end=this.value">

        Photo:
        <input type="file" onchange="uploadPhoto(event, ${i})">
      </div>`;
  });
}

// PHOTO
function uploadPhoto(e, i) {
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onloadend = () => {
    sessions[i].photo = reader.result.split(",")[1];
  };

  reader.readAsDataURL(file);
}

// SUBMIT (NO HEADERS → NO CORS ISSUE)
function submitAll() {

  if (sessions.length === 0) {
    alert("No data");
    return;
  }

  console.log(JSON.stringify({ entries: sessions }, null, 2));

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({ entries: sessions })
  })
  .then(() => {
    alert("Submitted successfully");
    sessions = [];
    render();
  })
  .catch(err => {
    console.error(err);
    alert("Error submitting");
  });
}

</script>

</body>
</html>
