<!DOCTYPE html>
<html>
<head>
  <title>Water Supply Reporting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding:15px; background:#f5f5f5;}
    select, button, input { width:100%; padding:10px; margin:8px 0; }
    .card { background:white; padding:10px; margin-top:10px; border-radius:8px; }
    .add { background:green; color:white; }
    .submit { background:blue; color:white; }
  </style>
</head>

<body>

<h2>Water Supply Reporting</h2>

<input list="gpList" id="gp" placeholder="Type GP name">
<datalist id="gpList"></datalist>

<input list="villageList" id="village" placeholder="Type Village name">
<datalist id="villageList"></datalist>

<input list="habitationList" id="habitation" placeholder="Type Habitation name">
<datalist id="habitationList"></datalist>

<button class="add" onclick="addSession()">Add Location</button>

<h3>Selected Locations</h3>
<div id="list"></div>

<button class="submit" onclick="submitAll()">Submit All</button>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzvpdw4FQp1CqR9h6dpcNbLuho1SDNiYZgF1InfgB3AQ6pzuUWxhm30NmtdmU0zUu5z/exec";

let data = {};
let sessions = [];

// LOAD DATA
fetch(URL)
.then(res => res.json())
.then(d => {
  data = d;
  loadGP();
})
.catch(() => alert("Error loading data"));

// LOAD GP
function loadGP() {
  let gpList = document.getElementById("gpList");
  gpList.innerHTML = "";

  for (let g in data) {
    gpList.innerHTML += `<option value="${g}">`;
  }
}

// GP → Village
document.getElementById("gp").oninput = function() {
  let villageList = document.getElementById("villageList");
  villageList.innerHTML = "";

  let gp = this.value;

  if (data[gp]) {
    for (let v in data[gp]) {
      villageList.innerHTML += `<option value="${v}">`;
    }
  }
};
// Village → Hab
document.getElementById("village").oninput = function() {
  let habList = document.getElementById("habitationList");
  habList.innerHTML = "";

  let gp = document.getElementById("gp").value;
  let village = this.value;

  if (data[gp] && data[gp][village]) {
    data[gp][village].forEach(h => {
      habList.innerHTML += `<option value="${h}">`;
    });
  }
};

// ADD SESSION
function addSession() {

  let gp = document.getElementById("gp").value;
  let village = document.getElementById("village").value;
  let hab = document.getElementById("habitation").value;

  if (!gp || !village || !hab) {
    alert("Select all fields");
    return;
  }

  sessions.push({
    gp,
    village,
    hab,
    photo: "",
    start: new Date().toLocaleString() // ✅ Start time
  });

  render();
}

// RENDER LIST
function render() {

  let div = document.getElementById("list");
  div.innerHTML = "";

  sessions.forEach((s, i) => {
    div.innerHTML += `
      <div class="card">
        <b>${s.gp}</b> - ${s.village} - ${s.hab}<br>
        Start: ${s.start}<br>
        <input type="file" onchange="uploadPhoto(event, ${i})">
      </div>
    `;
  });
}

// UPLOAD PHOTO
function uploadPhoto(e, index) {

  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onloadend = function() {
    sessions[index].photo = reader.result.split(",")[1];
  };

  reader.readAsDataURL(file);
}

// SUBMIT ALL
function submitAll() {

  if (sessions.length === 0) {
    alert("No locations added");
    return;
  }

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      entries: sessions
    })
  })
  .then(res => res.text())
  .then(res => {
    console.log("Server response:", res);
    alert("All data submitted successfully");
    sessions = [];
    render();
  })
  .catch(err => {
    console.error("Error:", err);
    alert("Error submitting data");
  });

}

</script>

</body>
</html>
