<!DOCTYPE html>
<html>
<head>
  <title>Water Supply Reporting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding:15px; background:#f5f5f5;}
    select, button, input { width:100%; padding:10px; margin:8px 0; }
    .card { background:white; padding:10px; margin-top:10px; border-radius:8px; }
    .stop { background:red; color:white; }
    .start { background:green; color:white; }
  </style>
</head>

<body>

<h2>Water Supply Reporting</h2>

<select id="gp">
  <option value="">Select GP</option>
</select>

<select id="village">
  <option value="">Select Village</option>
</select>

<select id="habitation">
  <option value="">Select Habitation</option>
</select>

<input type="file" id="photo" accept="image/*">

<button class="start" onclick="startSupply()">Start Supply</button>

<h3>Active Supplies</h3>
<div id="sessions"></div>

<script>

//  PASTE YOUR GOOGLE SCRIPT URL HERE
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1lpYNqH90SPnjQtauk3nnn7vbBWapxQKxRocMcQwZlohGgTqZGqKrQMaEAxWwNMPYIQ/exec";

//  YOUR DATA (ADD FULL DATA HERE)
const data = {
  "GP1": {
    "Village1": ["Hab1","Hab2"],
    "Village2": ["Hab3"]
  },
  "GP2": {
    "Village3": ["Hab4","Hab5"]
  }
};

let activeSessions = {};

// Populate GP
let gpSelect = document.getElementById("gp");
for (let gp in data) {
  gpSelect.innerHTML += `<option value="${gp}">${gp}</option>`;
}

// GP → Village
gpSelect.onchange = function() {
  let v = document.getElementById("village");
  v.innerHTML = "<option>Select Village</option>";
  for (let village in data[this.value]) {
    v.innerHTML += `<option value="${village}">${village}</option>`;
  }
};

// Village → Habitation
document.getElementById("village").onchange = function() {
  let h = document.getElementById("habitation");
  h.innerHTML = "<option>Select Habitation</option>";
  data[gpSelect.value][this.value].forEach(x=>{
    h.innerHTML += `<option value="${x}">${x}</option>`;
  });
};

// START
function startSupply() {

  let file = document.getElementById("photo").files[0];

  if (!file) {
    alert("Upload photo");
    return;
  }

  let reader = new FileReader();

  reader.onloadend = function() {

    let id = Date.now().toString();

    let gp = gpSelect.value;
    let village = document.getElementById("village").value;
    let hab = document.getElementById("habitation").value;

    let startTime = new Date().toLocaleString();

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        type: "start",
        id,
        gp,
        village,
        hab,
        start: startTime,
        photo: reader.result.split(",")[1]
      })
    });

    activeSessions[id] = { gp, village, hab, start: startTime };

    document.getElementById("photo").value = "";
    renderSessions();
  };

  reader.readAsDataURL(file);
}

// STOP
function stopSupply(id) {

  let stopTime = new Date().toLocaleString();

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "stop",
      id,
      stop: stopTime
    })
  });

  delete activeSessions[id];
  renderSessions();
}

// DISPLAY
function renderSessions() {

  let div = document.getElementById("sessions");
  div.innerHTML = "";

  for (let id in activeSessions) {

    let s = activeSessions[id];

    div.innerHTML += `
      <div class="card">
        <b>${s.gp}</b> - ${s.village} - ${s.hab}<br>
        Start: ${s.start}<br>
        <button class="stop" onclick="stopSupply('${id}')">Stop</button>
      </div>
    `;
  }
}

</script>

</body>
</html>
