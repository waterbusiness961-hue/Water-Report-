<!DOCTYPE html>
<html>
<head>
  <title>Water Supply Reporting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding:15px; background:#f5f5f5;}
    select, button, input { width:100%; padding:10px; margin:8px 0; }
    .card { background:white; padding:10px; margin-top:10px; border-radius:8px; }
    .stop { background:red; color:white; }
    .start { background:green; color:white; }
  </style>
</head>

<body>

<h2>Water Supply Reporting</h2>

<select id="gp"></select>
<select id="village"></select>
<select id="habitation"></select>

<input type="file" id="photo" accept="image/*">

<button class="start" onclick="startSupply()">Start Supply</button>

<h3>Active Supplies</h3>
<div id="sessions"></div>

<script>

// 🔴 PASTE YOUR WEB APP URL HERE
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrCddh3Kiu5ffnsrI8Rrn_dRQ56btSHkyOKUI7ivhZbGlbowXZe3Heav6RbuR9Qv9l1w/exec";

let data = {};
let activeSessions = {};

// 🔹 LOAD DATA FROM GOOGLE SHEET
fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(resData => {
    data = resData;
    loadGP();
  });

// LOAD GP
function loadGP() {
  let gp = document.getElementById("gp");
  gp.innerHTML = "<option value=''>Select GP</option>";

  for (let g in data) {
    gp.innerHTML += `<option value="${g}">${g}</option>`;
  }
}

// GP → Village
document.getElementById("gp").onchange = function() {

  let v = document.getElementById("village");
  v.innerHTML = "<option value=''>Select Village</option>";

  for (let village in data[this.value]) {
    v.innerHTML += `<option value="${village}">${village}</option>`;
  }
};

// Village → Habitation
document.getElementById("village").onchange = function() {

  let h = document.getElementById("habitation");
  h.innerHTML = "<option value=''>Select Habitation</option>";

  data[document.getElementById("gp").value][this.value].forEach(x=>{
    h.innerHTML += `<option value="${x}">${x}</option>`;
  });
};

// START
function startSupply() {

  let file = document.getElementById("photo").files[0];

  if (!file) {
    alert("Upload photo");
    return;
  }

  let gp = document.getElementById("gp").value;
  let village = document.getElementById("village").value;
  let hab = document.getElementById("habitation").value;

  if (!gp || !village || !hab) {
    alert("Select all fields");
    return;
  }

  let reader = new FileReader();

  reader.onloadend = function() {

    let id = Date.now().toString();
    let startTime = new Date().toLocaleString();

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        type: "start",
        id,
        gp,
        village,
        hab,
        start: startTime,
        photo: reader.result.split(",")[1]
      })
    });

    activeSessions[id] = { gp, village, hab, start: startTime };

    document.getElementById("photo").value = "";
    renderSessions();
  };

  reader.readAsDataURL(file);
}

// STOP
function stopSupply(id) {

  let stopTime = new Date().toLocaleString();

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "stop",
      id,
      stop: stopTime
    })
  });

  delete activeSessions[id];
  renderSessions();
}

// DISPLAY ACTIVE
function renderSessions() {

  let div = document.getElementById("sessions");
  div.innerHTML = "";

  for (let id in activeSessions) {

    let s = activeSessions[id];

    div.innerHTML += `
      <div class="card">
        <b>${s.gp}</b> - ${s.village} - ${s.hab}<br>
        Start: ${s.start}<br>
        <button class="stop" onclick="stopSupply('${id}')">Stop</button>
      </div>
    `;
  }
}

</script>

</body>
</html>
