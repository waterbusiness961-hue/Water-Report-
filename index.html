<script>

// ADD SESSION (MULTIPLE HAB WITH INDIVIDUAL INPUTS)
function addSession() {

  let gp = document.getElementById("gp").value;
  let village = document.getElementById("village").value;

  let checked = document.querySelectorAll("#habitationList input:checked");

  if (!gp || !village || checked.length === 0) {
    alert("Fill all fields");
    return;
  }

  checked.forEach(c => {

    sessions.push({
      gp,
      village,
      hab: c.value,
      start: "",
      end: "",
      photo: ""
    });

  });

  render();
}


// RENDER WITH INDIVIDUAL CONTROLS
function render() {

  let div = document.getElementById("list");
  div.innerHTML = "";

  sessions.forEach((s, i) => {

    div.innerHTML += `
      <div class="card">

        <b>${s.gp}</b> - ${s.village} - ${s.hab}<br><br>

        Start Time:
        <input type="time" onchange="updateStart(${i}, this.value)"><br>

        End Time:
        <input type="time" onchange="updateEnd(${i}, this.value)"><br>

        Upload Photo:
        <input type="file" onchange="uploadPhoto(event, ${i})">

      </div>
    `;
  });
}


// UPDATE START TIME
function updateStart(index, value) {
  sessions[index].start = value;
}

// UPDATE END TIME
function updateEnd(index, value) {
  sessions[index].end = value;
}


// FORMAT TIME (AM/PM)
function formatTime(time) {
  if (!time) return "";
  let [h, m] = time.split(":");
  let ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}


// PHOTO UPLOAD
function uploadPhoto(e, index) {

  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onloadend = function() {
    sessions[index].photo = reader.result.split(",")[1];
  };

  reader.readAsDataURL(file);
}


// SUBMIT VALIDATION
function submitAll() {

  if (sessions.length === 0) {
    alert("No data");
    return;
  }

  for (let s of sessions) {
    if (!s.start || !s.end) {
      alert("Fill time for all habitations");
      return;
    }
  }

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({ entries: sessions })
  })
  .then(res => res.text())
  .then(() => {
    alert("Submitted successfully");
    sessions = [];
    render();
  })
  .catch(() => alert("Error"));
}

</script>
