<!DOCTYPE html>
<html>
<head>
  <title>Water Supply Reporting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding:15px; background:#f5f5f5;}
    select, button, input { width:100%; padding:10px; margin:8px 0; }
    .card { background:white; padding:10px; margin-top:10px; border-radius:8px; }
    .add { background:green; color:white; }
    .submit { background:blue; color:white; }
  </style>
</head>

<body>

<h2>Water Supply Reporting</h2>

<select id="gp"></select>
<select id="village"></select>
<select id="habitation"></select>

<button class="add" onclick="addSession()">Add Location</button>

<h3>Selected Locations</h3>
<div id="list"></div>

<button class="submit" onclick="submitAll()">Submit All</button>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxi293yP4aeMvNQamzYn81JmeAOrANELZ1wiqsBg4q2oxaplbrw_PiAAa8kVSxIYhuY/exec";

let data = {};
let sessions = [];

// LOAD DATA
fetch(URL)
.then(res => res.json())
.then(d => {
  data = d;
  loadGP();
})
.catch(() => alert("Error loading data"));

// LOAD GP
function loadGP() {
  let gp = document.getElementById("gp");
  gp.innerHTML = "<option value=''>Select GP</option>";

  for (let g in data) {
    gp.innerHTML += `<option value="${g}">${g}</option>`;
  }
}

// GP → Village
document.getElementById("gp").onchange = function() {
  let v = document.getElementById("village");
  v.innerHTML = "<option value=''>Select Village</option>";

  for (let x in data[this.value]) {
    v.innerHTML += `<option value="${x}">${x}</option>`;
  }
};

// Village → Hab
document.getElementById("village").onchange = function() {
  let h = document.getElementById("habitation");
  h.innerHTML = "<option value=''>Select Habitation</option>";

  data[gp.value][this.value].forEach(x=>{
    h.innerHTML += `<option value="${x}">${x}</option>`;
  });
};

// ADD SESSION
function addSession() {

  let gp = document.getElementById("gp").value;
  let village = document.getElementById("village").value;
  let hab = document.getElementById("habitation").value;

  if (!gp || !village || !hab) {
    alert("Select all fields");
    return;
  }

  sessions.push({
    gp,
    village,
    hab,
    photo: "",
    start: new Date().toLocaleString() // ✅ Start time
  });

  render();
}

// RENDER LIST
function render() {

  let div = document.getElementById("list");
  div.innerHTML = "";

  sessions.forEach((s, i) => {
    div.innerHTML += `
      <div class="card">
        <b>${s.gp}</b> - ${s.village} - ${s.hab}<br>
        Start: ${s.start}<br>
        <input type="file" onchange="uploadPhoto(event, ${i})">
      </div>
    `;
  });
}

// UPLOAD PHOTO
function uploadPhoto(e, index) {

  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onloadend = function() {
    sessions[index].photo = reader.result.split(",")[1];
  };

  reader.readAsDataURL(file);
}

// SUBMIT ALL
function submitAll() {

  if (sessions.length === 0) {
    alert("No locations added");
    return;
  }

  fetch(URL, {
    method: "POST",
    body: JSON.stringify(sessions)
  })
  .then(res => res.text())
  .then(res => {
    alert("All data submitted successfully");
    sessions = [];
    render();
  })
  .catch(err => alert("Error submitting data"));
}

</script>

</body>
</html>
