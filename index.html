<!DOCTYPE html>
<html>
<head>
  <title>Water Supply Reporting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding:15px; background:#f5f5f5;}
    select, input, button { width:100%; padding:10px; margin:8px 0; }

    .card { background:white; padding:10px; margin-top:10px; border-radius:8px; }
    .add { background:green; color:white; }
    .submit { background:blue; color:white; }

    .hab-list {
      background:white;
      padding:10px;
      border-radius:8px;
      max-height:200px;
      overflow:auto;
    }

    .hab-list label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 4px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .hab-list input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .hab-list span { flex: 1; }
  </style>
</head>

<body>

<h2>Water Supply Reporting</h2>

<label>Select Date</label>
<input type="date" id="reportDate">

<!-- GP -->
<select id="gp">
  <option value="">Select GP</option>
</select>

<!-- Village -->
<select id="village">
  <option value="">Select Village</option>
</select>

<!-- HABITATIONS -->
<div class="hab-list" id="habitationList"></div>

<button class="add" onclick="addSession()">Add Entry</button>

<h3>Entries</h3>
<div id="list"></div>

<button class="submit" onclick="submitAll()">Submit All</button>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzvpdw4FQp1CqR9h6dpcNbLuho1SDNiYZgF1InfgB3AQ6pzuUWxhm30NmtdmU0zUu5z/exec";

let data = {};
let sessions = [];

// LOAD DATA
fetch(URL)
.then(res => res.json())
.then(d => {
  data = d;
  loadGP();
})
.catch(() => alert("Error loading data"));


// LOAD GP
function loadGP() {
  let gpSelect = document.getElementById("gp");
  gpSelect.innerHTML = `<option value="">Select GP</option>`;

  for (let g in data) {
    gpSelect.innerHTML += `<option value="${g}">${g}</option>`;
  }
}


// GP → Village
document.getElementById("gp").onchange = function() {
  let gp = this.value;

  let villageSelect = document.getElementById("village");
  villageSelect.innerHTML = `<option value="">Select Village</option>`;

  document.getElementById("habitationList").innerHTML = "";

  if (data[gp]) {
    for (let v in data[gp]) {
      villageSelect.innerHTML += `<option value="${v}">${v}</option>`;
    }
  }
};


// Village → Habitations
document.getElementById("village").onchange = function() {

  let gp = document.getElementById("gp").value;
  let village = this.value;

  let div = document.getElementById("habitationList");
  div.innerHTML = "";

  if (data[gp] && data[gp][village]) {
    data[gp][village].forEach(h => {
      div.innerHTML += `
        <label>
          <span>${h}</span>
          <input type="checkbox" value="${h}">
        </label>
      `;
    });
  }
};


// ADD SESSION
function addSession() {

  let gp = document.getElementById("gp").value;
  let village = document.getElementById("village").value;
  let date = document.getElementById("reportDate").value;

  let checked = document.querySelectorAll("#habitationList input:checked");

  if (!gp || !village || checked.length === 0 || !date) {
    alert("Fill all fields");
    return;
  }

  checked.forEach(c => {
    sessions.push({
      gp,
      village,
      hab: c.value,
      date,
      start: "",
      end: "",
      photo: ""
    });
  });

  // ✅ CLEAR INPUTS (important)
  document.getElementById("gp").value = "";
  document.getElementById("village").innerHTML = `<option value="">Select Village</option>`;
  document.getElementById("reportDate").value = "";
  document.getElementById("habitationList").innerHTML = "";

  render();
}


// RENDER
function render() {

  let div = document.getElementById("list");
  div.innerHTML = "";

  sessions.forEach((s, i) => {

    div.innerHTML += `
      <div class="card">
        <b>${s.gp}</b> - ${s.village} - ${s.hab}<br>
        Date: ${s.date}<br><br>

        Start Time:
        <input type="time" onchange="updateStart(${i}, this.value)"><br>

        End Time:
        <input type="time" onchange="updateEnd(${i}, this.value)"><br>

        Upload Photo:
        <input type="file" onchange="uploadPhoto(event, ${i})">
      </div>
    `;
  });
}


// UPDATE TIME
function updateStart(i, val) { sessions[i].start = val; }
function updateEnd(i, val) { sessions[i].end = val; }


// PHOTO
function uploadPhoto(e, i) {
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onloadend = function() {
    sessions[i].photo = reader.result.split(",")[1];
  };

  reader.readAsDataURL(file);
}


// SUBMIT
function submitAll() {

  if (sessions.length === 0) {
    alert("No data");
    return;
  }

  for (let s of sessions) {
    if (!s.start || !s.end) {
      alert("Fill time for all habitations");
      return;
    }
  }

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({ entries: sessions })
  })
  .then(res => res.text())
  .then(() => {
    alert("Submitted successfully");
    sessions = [];
    render();
  })
  .catch(() => alert("Error submitting data"));
}

</script>

</body>
</html>
