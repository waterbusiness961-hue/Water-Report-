<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Water Supply</title>

<style>
body { font-family: Arial; padding: 15px; background:#f5f5f5;}
.box { background:white; padding:15px; border-radius:10px;}
select, button, input { width:100%; padding:10px; margin-top:10px; }

.start { background:green; color:white;}
.stop { background:red; color:white;}
.submit { background:blue; color:white;}

.session {
  background:#e8f5e9;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="box">

<h3>Water Supply Reporting</h3>

<select id="gp" onchange="loadVillage()"></select>
<select id="village" onchange="loadHabitation()"></select>
<select id="habitation"></select>

<button class="start" onclick="startSupply()">Start Supply</button>

<h4>Active Supplies</h4>
<div id="sessions"></div>

<input type="file" id="photo" accept="image/*">

<button class="submit" onclick="submitData()">Submit All</button>

</div>

<script>

let SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYHI6ZBbyO8Ha1BB_e6jA2S2eQSRHv3WeqdlWRi5emgN7jqMjTq1zGFMr49GJTx33qhg/exec";
let data = {};
let activeSessions = {};

//  LOAD DATA
fetch(SCRIPT_URL + "?type=getData")
.then(res => res.json())
.then(res => {
  data = res;
  loadGP();
});

//  LOAD GP
function loadGP() {
  let gp = document.getElementById("gp");
  gp.innerHTML = "<option>Select GP</option>";
  for (let g in data) {
    gp.innerHTML += `<option value="${g}">${g}</option>`;
  }
}

//  LOAD VILLAGE
function loadVillage() {
  let gp = document.getElementById("gp").value;
  let village = document.getElementById("village");

  village.innerHTML = "<option>Select Village</option>";

  if (!data[gp]) return;

  for (let v in data[gp]) {
    village.innerHTML += `<option value="${v}">${v}</option>`;
  }
}

//  LOAD HABITATION
function loadHabitation() {
  let gp = document.getElementById("gp").value;
  let village = document.getElementById("village").value;
  let hab = document.getElementById("habitation");

  hab.innerHTML = "<option>Select Habitation</option>";

  if (!data[gp] || !data[gp][village]) return;

  data[gp][village].forEach(h => {
    hab.innerHTML += `<option value="${h}">${h}</option>`;
  });
}

//  START SUPPLY
function startSupply() {

  let gp = document.getElementById("gp").value;
  let village = document.getElementById("village").value;
  let hab = document.getElementById("habitation").value;

  if (!gp || !village || !hab) {
    alert("Select all fields");
    return;
  }

  let key = gp + "|" + village + "|" + hab;

  if (activeSessions[key]) {
    alert("Already started!");
    return;
  }

  activeSessions[key] = {
    gp, village, hab,
    start: new Date().toLocaleString(),
    stop: ""
  };

  renderSessions();
}

//  STOP SUPPLY
function stopSupply(key) {
  activeSessions[key].stop = new Date().toLocaleString();
  renderSessions();
}

//  SHOW ACTIVE LIST
function renderSessions() {

  let container = document.getElementById("sessions");
  container.innerHTML = "";

  for (let key in activeSessions) {
    let s = activeSessions[key];

    container.innerHTML += `
      <div class="session">
        <b>${s.gp} - ${s.village} - ${s.hab}</b><br>
        Start: ${s.start}<br>
        Stop: ${s.stop || "Running"}<br>
        ${!s.stop ? `<button onclick="stopSupply('${key}')" class="stop">Stop</button>` : ""}
      </div>
    `;
  }
}

// 🔹 SUBMIT ALL
function submitData() {

  let file = document.getElementById("photo").files[0];

  if (!file) {
    alert("Upload photo");
    return;
  }

  let reader = new FileReader();

  reader.onloadend = function() {

    let base64 = reader.result.split(",")[1];

    let entries = [];

    for (let key in activeSessions) {
      let s = activeSessions[key];

      if (s.start && s.stop) {
        entries.push(s);
      }
    }

    if (entries.length === 0) {
      alert("No completed entries");
      return;
    }

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        entries: entries,
        photo: base64,
        fileName: file.name
      })
    })
    .then(() => {
      alert("Submitted Successfully");
      location.reload();
    })
    .catch(() => alert("Error"));
  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
